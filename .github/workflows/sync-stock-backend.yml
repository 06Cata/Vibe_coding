name: sync-stock-backend

on:
  schedule:
    - cron: "0 8 * * 1-5"
  workflow_dispatch:
    inputs:
      days:
        description: "Lookback days to sync"
        required: false
        default: "60"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger backend stock sync
        run: |
          curl --fail-with-body --show-error --silent -X POST "${{ secrets.BACKEND_SYNC_URL }}" \
            -H "Authorization: Bearer ${{ secrets.INTERNAL_CRON_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"days\":${{ github.event.inputs.days || '60' }}}"
