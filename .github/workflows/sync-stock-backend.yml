name: sync-stock-backend

on:
  schedule:
    - cron: "0 8 * * 1-5"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger backend stock sync
        run: |
          curl -X POST "${{ secrets.BACKEND_SYNC_URL }}" \
            -H "Authorization: Bearer ${{ secrets.INTERNAL_CRON_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"days":60}'
